<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeGuard – Personal Safety</title>
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red:    #d32f2f;
    --red-dk: #b71c1c;
    --red-lt: #ffebee;
    --accent: #ff5252;
    --text:   #1a1a1a;
    --muted:  #666;
    --white:  #fff;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,.12);
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f5f5;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── HEADER ── */
  header {
    background: var(--red);
    color: var(--white);
    padding: 18px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.5rem; letter-spacing: 1px; }
  header p  { font-size: .82rem; opacity: .85; margin-top: 2px; }

  /* ── LAYOUT ── */
  .container { max-width: 520px; margin: 0 auto; padding: 20px 16px; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 20px;
    margin-bottom: 18px;
  }
  .card h2 {
    font-size: 1rem;
    color: var(--red);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── SOS BUTTON ── */
  .sos-wrap { text-align: center; padding: 10px 0 6px; }
  #sosBtn {
    width: 150px; height: 150px;
    border-radius: 50%;
    border: 6px solid var(--red-dk);
    background: var(--red);
    color: var(--white);
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 0 0 rgba(211,47,47,.5);
    transition: transform .15s, background .15s;
    animation: pulse 2s infinite;
  }
  #sosBtn:active { transform: scale(.93); }
  #sosBtn.active {
    background: var(--red-dk);
    animation: pulseActive 1s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(211,47,47,.4); }
    50%      { box-shadow: 0 0 0 18px rgba(211,47,47,0); }
  }
  @keyframes pulseActive {
    0%,100% { box-shadow: 0 0 0 0 rgba(183,28,28,.7); }
    50%      { box-shadow: 0 0 0 24px rgba(183,28,28,0); }
  }
  #sosMsg {
    margin-top: 14px;
    font-weight: 700;
    color: var(--red);
    font-size: 1rem;
    min-height: 24px;
    transition: opacity .3s;
  }

  /* ── ALERT BANNER ── */
  #alertBanner {
    display: none;
    background: var(--red);
    color: var(--white);
    text-align: center;
    padding: 14px 16px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: var(--radius);
    margin-bottom: 18px;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: .6; } }

  /* ── LOCATION ── */
  #locText { font-size: .9rem; color: var(--muted); margin-bottom: 12px; min-height: 20px; }
  #coordsBox {
    background: var(--red-lt);
    border-left: 4px solid var(--red);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: .85rem;
    display: none;
    margin-bottom: 12px;
    word-break: break-all;
  }
  #coordsBox strong { color: var(--red); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.96); }
  .btn-red    { background: var(--red); color: var(--white); }
  .btn-green  { background: #2e7d32; color: var(--white); }
  .btn-blue   { background:#1565c0; color: var(--white); }
  .btn-yellow { background: #ffc107; color: var(--white); }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--red);
    color: var(--red);
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }

  /* ── CONTACTS ── */
  .contact-form { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .contact-form input {
    flex: 1;
    min-width: 120px;
    padding: 9px 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: .88rem;
    outline: none;
    transition: border-color .2s;
  }
  .contact-form input:focus { border-color: var(--red); }
  #contactList { list-style: none; }
  #contactList li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--red-lt);
    margin-bottom: 8px;
    font-size: .88rem;
  }
  #contactList li .info strong { display: block; color: var(--text); }
  #contactList li .info span   { color: var(--muted); font-size: .82rem; }
  .del-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background .2s;
  }
  .del-btn:hover { background: #ffcdd2; }
  .call-btn {
    background: none;
    border: none;
    color: #2e7d32;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background .2s;
  }
  .call-btn:hover { background: #c8e6c9; }
  .actions { display: flex; gap: 4px; }
  #noContacts { color: var(--muted); font-size: .88rem; text-align: center; padding: 10px 0; }

  /* ── FOOTER ── */
  footer { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <h1>🛡️ SafeGuard</h1>
  <p>Personal Safety App – Stay Safe, Stay Connected</p>
</header>

<div class="container">

  <!-- ALERT BANNER -->
  <div id="alertBanner">🚨 EMERGENCY SOS ACTIVATED! HELP NEEDED! 🚨</div>

  <!-- SOS -->
  <div class="card">
    <h2>🆘 Emergency SOS</h2>
    <div class="sos-wrap">
      <button id="sosBtn" onclick="toggleSOS()">SOS</button>
      <p id="sosMsg"></p>
    </div>
  </div>

  <!-- LOCATION -->
  <div class="card">
    <h2>📍 My Location</h2>
    <p id="locText">Press the button to get your current location.</p>
    <div id="coordsBox"></div>
    <div class="btn-row">
      <button class="btn btn-red" onclick="getLocation()">📡 Get Location</button>
      <button class="btn btn-green" id="waBtn" onclick="shareWhatsApp()" disabled>💬 WhatsApp</button>
      <button class="btn btn-blue"  id="smsBtn" onclick="shareSMS()" disabled>📱 SMS</button>
    </div>
  </div>

  <!-- CONTACTS -->
  <div class="card">
    <h2>👥 Emergency Contacts</h2>
    <div class="contact-form">
      <input id="cName"  type="text"  placeholder="Name" maxlength="30"/>
      <input id="cPhone" type="tel"   placeholder="Phone (+91...)" maxlength="15"/>
      <button class="btn btn-red" onclick="addContact()">➕ Add</button>
    </div>
    <ul id="contactList"></ul>
    <p id="noContacts">No contacts added yet.</p>
  </div>

</div>

<footer>SafeGuard &copy; 2025 &nbsp;|&nbsp; Your safety, our priority</footer>

<script>
/* =========================================================
   STATE
   ========================================================= */
let sosActive = false;
let userCoords = null; // { lat, lng }
let sosInterval = null;
let alarmAudioCtx = null;
let alarmOscillator = null;
let alarmGain = null;
let alarmTimer = null;

/* =========================================================
   SOS
   ========================================================= */
function toggleSOS() {
  const btn    = document.getElementById('sosBtn');
  const msg    = document.getElementById('sosMsg');
  const banner = document.getElementById('alertBanner');

  sosActive = !sosActive;

  if (sosActive) {
    btn.classList.add('active');
    msg.textContent = '⚠️ SOS Active – Tap again to cancel';
    banner.style.display = 'block';
    // Vibrate pattern if supported
    if (navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
    // Auto-trigger location fetch
    getLocation();
    // Start emergency alarm tone
    startAlarm();
    const call112 = confirm('SOS is active. Call emergency services on 112 now?');
    if (call112) {
      window.location.href = 'tel:112';
    }
  } else {
    btn.classList.remove('active');
    msg.textContent = '✅ SOS Cancelled';
    banner.style.display = 'none';
    if (navigator.vibrate) navigator.vibrate(0);
    stopAlarm();
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }
}

function startAlarm() {
  if (!window.AudioContext && !window.webkitAudioContext) return;
  if (alarmAudioCtx) return;

  const AudioContext = window.AudioContext || window.webkitAudioContext;
  alarmAudioCtx = new AudioContext();
  alarmOscillator = alarmAudioCtx.createOscillator();
  alarmGain = alarmAudioCtx.createGain();

  alarmOscillator.type = 'triangle';
  alarmOscillator.frequency.value = 880;
  alarmGain.gain.value = 0;

  alarmOscillator.connect(alarmGain);
  alarmGain.connect(alarmAudioCtx.destination);
  alarmOscillator.start();

  if (alarmAudioCtx.state === 'suspended') {
    alarmAudioCtx.resume();
  }

  let on = false;
  alarmTimer = setInterval(() => {
    on = !on;
    alarmGain.gain.setTargetAtTime(on ? 0.25 : 0, alarmAudioCtx.currentTime, 0.02);
    alarmOscillator.frequency.setTargetAtTime(on ? 880 : 660, alarmAudioCtx.currentTime, 0.02);
  }, 500);
}

function stopAlarm() {
  if (!alarmAudioCtx) return;
  clearInterval(alarmTimer);
  alarmTimer = null;
  alarmOscillator.stop();
  alarmOscillator.disconnect();
  alarmGain.disconnect();
  alarmAudioCtx.close();
  alarmAudioCtx = alarmOscillator = alarmGain = null;
}

/* =========================================================
   GEOLOCATION
   ========================================================= */
function getLocation() {
  const txt   = document.getElementById('locText');
  const box   = document.getElementById('coordsBox');
  const waBtn = document.getElementById('waBtn');
  const smsBtn= document.getElementById('smsBtn');

  if (!navigator.geolocation) {
    txt.textContent = '❌ Geolocation is not supported by this browser.';
    return;
  }
  txt.textContent = '🔄 Fetching your location…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      userCoords = { lat, lng };
      txt.textContent = '✅ Location fetched successfully!';
      box.style.display = 'block';
      box.innerHTML = `
        <strong>Latitude:</strong>  ${lat.toFixed(6)}<br>
        <strong>Longitude:</strong> ${lng.toFixed(6)}<br>
        <strong>Accuracy:</strong>  ±${Math.round(accuracy)} m<br>
        <strong>Maps:</strong> <a href="https://maps.google.com/?q=${lat},${lng}" target="_blank" style="color:var(--red)">Open in Google Maps ↗</a>
      `;
      waBtn.disabled  = false;
      smsBtn.disabled = false;
    },
    err => {
      const msgs = {
        1: 'Permission denied. Please allow location access.',
        2: 'Position unavailable. Try again.',
        3: 'Request timed out. Try again.',
      };
      txt.textContent = '❌ ' + (msgs[err.code] || 'Unknown error.');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function buildLocationMsg() {
  if (!userCoords) return 'I need help! (location unavailable)';
  const { lat, lng } = userCoords;
  return `🆘 EMERGENCY! I need help! My location: https://maps.google.com/?q=${lat},${lng}`;
}

function shareWhatsApp() {
  const msg = encodeURIComponent(buildLocationMsg());
  // Try first contact's phone, else open generic WhatsApp
  const contacts = getContacts();
  const phone = contacts.length ? contacts[0].phone.replace(/\D/g,'') : '';
  const url = phone
    ? `https://wa.me/${phone}?text=${msg}`
    : `https://wa.me/?text=${msg}`;
  window.open(url, '_blank');
}

function shareSMS() {
  const msg = encodeURIComponent(buildLocationMsg());
  const contacts = getContacts();
  const phone = contacts.length ? contacts[0].phone : '';
  window.location.href = `sms:${phone}?body=${msg}`;
}

/* =========================================================
   CONTACTS  (in-memory storage, no localStorage)
   ========================================================= */
let contacts = [];

function getContacts() { return contacts; }

function saveContacts() {
  // stored in memory only
  renderContacts();
}

function addContact() {
  const name  = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();

  if (!name || !phone) { alert('Please enter both name and phone number.'); return; }
  if (!/^\+?\d{7,15}$/.test(phone)) { alert('Enter a valid phone number (7–15 digits, optional + prefix).'); return; }

  contacts.push({ id: Date.now(), name, phone });
  saveContacts();
  document.getElementById('cName').value  = '';
  document.getElementById('cPhone').value = '';
}

function deleteContact(id) {
  contacts = contacts.filter(c => c.id !== id);
  saveContacts();
}

function callContact(id) {
  const contact = contacts.find(c => c.id === id);
  if (contact) {
    window.location.href = `tel:${contact.phone}`;
  }
}

function renderContacts() {
  const list = document.getElementById('contactList');
  const none = document.getElementById('noContacts');
  list.innerHTML = '';

  if (!contacts.length) { none.style.display = 'block'; return; }
  none.style.display = 'none';

  contacts.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="info">
        <strong>${escHtml(c.name)}</strong>
        <span>${escHtml(c.phone)}</span>
      </div>
      <div class="actions">
        <button class="call-btn" onclick="callContact(${c.id})" title="Call">📞</button>
        <button class="del-btn" onclick="deleteContact(${c.id})" title="Remove">🗑️</button>
      </div>
    `;
    list.appendChild(li);
  });
}

function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
   INIT
   ========================================================= */
renderContacts();
</script>
</body>
</html>
